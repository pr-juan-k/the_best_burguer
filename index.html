<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Best Burguer - Pedidos Online</title>
  
 <!-- El icono de la pestaña del navegador (aquí sí funciona la ruta relativa) -->
  <link rel="icon" type="image/jpeg" href="images/the-logo.jpeg">

  <!-- Etiquetas Open Graph para WhatsApp, Facebook e Instagram -->
  <meta property="og:type" content="website">
  
  <!-- REEMPLAZA ESTO por el enlace principal de tu web en GitHub -->
  <meta property="og:url" content="https://github.com/pr-juan-k/the_best_burguer.git">
  
  <meta property="og:title" content="The Best Burguer - Pedidos Online">
  <meta property="og:description" content="The Best Burguer: Realiza tu pedido de hamburguesas, pizzas y empanadas">
  
  <!-- REEMPLAZA ESTO por la ruta completa a tu imagen -->
  <meta property="og:image" content="https://github.com/pr-juan-k/the_best_burguer.git/images/the-logo.jpeg">
  
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="header">
      <div class="header-content">
        <img src="images/the-logo.jpeg" alt="Logo" class="header-logo">
        <div class="header-text">
          <h1 class="header-title">The Best Burguer</h1>
           <p class="header-subtitle">Diseñado by <a href="https://wa.me/5493815088924">Program.JK</a></p>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      <!-- Step 1: Menu Selection -->
      <section id="step1" class="step active">
        <h2 class="step-title">Selecciona tu comida</h2>
        <div class="menu-grid" id="menuGrid">
          <!-- Menu items will be rendered by JS -->
        </div>
      </section>

      <!-- Step 2: Variety Selection -->
      <section id="step2" class="step">
        <button class="back-btn" onclick="goBack(1)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Volver
        </button>
        <h2 class="step-title" id="varietyTitle">Selecciona el tipo</h2>
        <div class="variety-grid" id="varietyGrid">
          <!-- Variety options will be rendered by JS -->
        </div>
      </section>

      <!-- Step 3: Customization -->
      <section id="step3" class="step">
        <button class="back-btn" onclick="goBackFromStep3()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Volver
        </button>
        <h2 class="step-title" id="customizationTitle">Personaliza tu pedido</h2>
        <div id="customizationContent">
          <!-- Customization content will be rendered by JS -->
        </div>
      </section>

      <!-- Step 4: Order Actions -->
      <section id="step4" class="step">
        <h2 class="step-title">Pedido agregado</h2>
        <div class="success-message">
          <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          <p id="addedItemName">Item agregado al pedido</p>
        </div>
        <div class="action-buttons">
          <button id="btnOtroPedido" class="btn btn-secondary" onclick="addAnotherOrder()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="12" y1="8" x2="12" y2="16"/>
              <line x1="8" y1="12" x2="16" y2="12"/>
            </svg>
            Realizar otro pedido
          </button>
          
          <button class="btn btn-primary" onclick="abrirCartelCheckout()">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Hacer pedido
          </button>
        </div>
      </section>

      <!-- Beverages Selection -->
      <section id="beveragesSection" class="step">
        <button class="back-btn" onclick="goBack(4)">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
          </svg>
          Volver
        </button>
        <h2 class="step-title">Bebidas</h2>
        <div class="beverages-grid" id="beveragesGrid">
          <!-- Beverages will be rendered by JS -->
        </div>
      </section>
    </main>

    <!-- Order Summary -->
    <div class="order-summary" id="orderSummary">
      <button class="summary-toggle" onclick="toggleSummary()">
        <span class="summary-toggle-text">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="9" cy="21" r="1"/>
            <circle cx="20" cy="21" r="1"/>
            <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
          </svg>
          <span>Mi Pedido (<span id="itemCount">0</span>)</span>
        </span>
        <span class="summary-total">$<span id="totalPrice">0</span></span>
        <svg class="summary-arrow" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="18 15 12 9 6 15"/>
        </svg>
      </button>
      <div class="summary-content" id="summaryContent">
        <div class="summary-items" id="summaryItems">
          <!-- Order items will be rendered by JS -->
        </div>
        <div class="summary-actions">
          <button class="btn btn-primary btn-full" onclick="abrirCartelCheckout()" id="sendOrderBtn" disabled>
            <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
              <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
            </svg>
            Enviar pedido por WhatsApp
          </button>
        </div>
      </div>
    </div>
  </div>


    <div id="modalCheckout" class="modal-overlay" style="display: none;">
  <div class="modal-content">
    <h3>Detalles del Pedido</h3>
    
    <div class="form-group">
      <label for="clienteNombre">Nombre y Apellido</label>
      <input type="text" id="clienteNombre" placeholder="Ej: Familia Pérez" required>
    </div>

    <div class="form-group">
      <label for="tipoEntrega">Forma de entrega</label>
      <select id="tipoEntrega" onchange="toggleDireccion()">
        <option value="Retira por local">Retira del local</option>
        <option value="Envío a domicilio">Envío a domicilio</option>
      </select>
    </div>

    <div class="form-group" id="grupoDireccion" style="display: none;">
      
      <label for="clienteDireccion">Dirección exacta (Calle, número, barrio)</label>
      <input type="text" id="clienteDireccion" placeholder="Ej: San Martín 123, B° Centro" oninput="validarInputDireccion()">

      <label for="clienteReferencia" style="margin-top: 15px;">Referencia (Opcional)</label>
      <input type="text" id="clienteReferencia" placeholder="Ej: Algo que destaque tu ubicación (color portón, ventanas, etc.)">

       <div style="margin-top: 15px; text-align: center; background: #2a2a2a; padding: 10px; border-radius: 8px; border: 1px solid #444;">
        <label style="display: block; margin-bottom: 8px; font-size: 0.9em; color: #fff;">Ubicación GPS (Opcional)</label>
        
        <button type="button" id="btnGps" class="btn btn-secondary" onclick="obtenerUbicacion()" style="width: 100%;">
          📍 Obtener mi ubicación actual
        </button>
        
        <p id="gpsStatus" style="font-size: 0.85em; color: #aaa; margin-top: 8px;">Si quieres, puedes compartir tu ubicación para ayudarnos a encontrarte.</p>
        <input type="hidden" id="gpsLink" value="">
      </div>
      
    </div>

    <div class="form-group">
      <label for="metodoPago">Forma de Pago</label>
      <select id="metodoPago">
        <option value="Efectivo">Efectivo</option>
        <option value="Transferencia">Transferencia</option>
      </select>
    </div>

    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="cerrarCartelCheckout()">Cancelar</button>
      <button class="btn btn-primary" onclick="sendWhatsApp()">Confirmar y Enviar</button>
    </div>
  </div>
</div>

  <script src="scrypt.js"></script>
</body>
</html>
